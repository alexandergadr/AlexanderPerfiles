name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir Proyecto
        run: |
          unzip AlexanderPerfiles.zip -d extracted
          TARGET_DIR=$(find extracted -name package.json -exec dirname {} \; | head -n 1)
          echo "Proyecto encontrado en: $TARGET_DIR"
          cp -r "$TARGET_DIR"/. .

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Dependencias
        run: npm install

      - name: Sincronizar Capacitor
        run: npx cap sync

      - name: Compilar APK con Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: Alexander-Perfiles-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
