name: Build Android APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto y asegurar raíz
        run: |
          unzip -o AlexanderPerfiles.zip

          if [ ! -f "package.json" ]; then
            SUBDIR=$(find . -maxdepth 2 -name "package.json" -exec dirname {} \; | grep -v "^.$" | head -n 1)

            if [ -n "$SUBDIR" ]; then
              cp -r "$SUBDIR"/* . 2>/dev/null || true
              cp -r "$SUBDIR"/.* . 2>/dev/null || true
            fi
          fi

          rm -rf node_modules package-lock.json

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Sincronizar Capacitor
        run: npx cap sync

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Construir APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: AlexanderPerfiles-APK
          path: android/app/build/outputs/apk/debug/*.apk
