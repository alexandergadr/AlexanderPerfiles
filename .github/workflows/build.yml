name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir Proyecto de Forma Segura
        run: |
          unzip AlexanderPerfiles.zip
          if [ ! -f "package.json" ]; then
            echo "package.json no está en la raíz. Buscando en subcarpetas..."
            SUBDIR=$(find . -maxdepth 2 -name "package.json" -exec dirname {} \; | grep -v "^.$" | head -n 1)
            if [ -n "$SUBDIR" ]; then
              echo "Proyecto encontrado en la subcarpeta: $SUBDIR. Moviendo archivos a la raíz..."
              mv "$SUBDIR"/* . 2>/dev/null || true
              mv "$SUBDIR"/.* . 2>/dev/null || true
            else
              echo "ATENCIÓN: No se encontró package.json en ninguna parte."
            fi
          fi
          echo "Estructura de archivos lista para compilar:"
          ls -la

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Dependencias
        run: npm install --legacy-peer-deps

      - name: Sincronizar Capacitor
        run: npx cap sync

      - name: Compilar APK con Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: Alexander-Perfiles-APK
          path: android/app/build/outputs/apk/debug/*.apk
          
